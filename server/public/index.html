<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>СРЕДНЕВЕКОВЬЕ</title>
<style>
:root{
  --gold:#d4a236;--gold2:#f0c958;--gold3:#8a6020;
  --dark:#0a0604;--wood:#3a1f10;--wood2:#5a2f18;
  --red:#5a0e0e;--red2:#3a0a0a;
  --green:#2d6b3a;--green2:#1d4a26;
  --hex-grass:#4a7a28;--hex-forest:#2a5a18;--hex-stone:#6a6860;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Times New Roman',serif;
  background:var(--dark);color:#fff;user-select:none;-webkit-user-select:none;}
button{font-family:inherit;background:none;border:0;color:inherit;cursor:pointer;}

/* ===== AUTH ===== */
#auth{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#1a3a6a 0%,#2a4a1a 50%,#1a0e05 100%);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 16px 20px;overflow-y:auto;z-index:200;
}
.auth-logo{margin-top:12px;text-align:center;}
.auth-logo .t1{
  display:block;font-size:clamp(28px,8vw,58px);
  background:linear-gradient(180deg,#fff0a0,#e8a000 40%,#7a4000);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-weight:900;font-variant:small-caps;letter-spacing:3px;
  filter:drop-shadow(0 4px 0 #2a1400);
}
.auth-logo .t2{
  display:block;font-size:clamp(11px,3vw,16px);color:#5cd4ff;
  letter-spacing:5px;text-transform:uppercase;margin-top:2px;
}
.parch{
  background:linear-gradient(180deg,#7a5a30,#5a3a18);
  border:3px solid #3a2008;border-radius:8px;
  padding:18px 16px 20px;max-width:360px;width:100%;
  margin-top:12px;position:relative;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
}
.parch::before{content:'⚔ ✦ ⚔';position:absolute;top:-13px;left:50%;
  transform:translateX(-50%);font-size:18px;color:var(--gold2);white-space:nowrap;}
.parch .rl{position:absolute;top:0;left:-4px;width:10px;height:50%;
  background:linear-gradient(180deg,#c02020,#801010);border-radius:3px;}
.parch .rr{position:absolute;top:0;right:-4px;width:10px;height:50%;
  background:linear-gradient(180deg,#2040c0,#102080);border-radius:3px;}
.parch h3{font-size:12px;color:#f0d890;margin:8px 0 4px;text-shadow:1px 1px 0 #000;}
.parch input{width:100%;background:linear-gradient(180deg,#0a2010,#081808);
  border:2px solid var(--gold3);color:#80ff80;padding:9px 12px;
  font-size:14px;border-radius:5px;margin-bottom:7px;font-family:inherit;outline:none;}
.parch input:focus{border-color:var(--gold2);}
.parch input::placeholder{color:#305030;}
.parch .err{color:#ff8080;font-size:12px;min-height:16px;margin-bottom:5px;text-align:center;}
.parch .sw{font-size:12px;color:#c0a070;margin-top:7px;text-align:center;}
.parch .sw a{color:#5cd4ff;text-decoration:underline;cursor:pointer;}
.btn-g{display:block;width:100%;padding:12px;
  background:linear-gradient(180deg,#3aaa4a,#207030);
  border:3px solid #5cff7a;border-radius:6px;color:#fff;
  font-weight:bold;font-size:14px;letter-spacing:2px;text-transform:uppercase;
  text-align:center;margin-bottom:7px;cursor:pointer;
  box-shadow:0 4px 0 #0a3010;}
.btn-g:active{transform:translateY(2px);box-shadow:0 2px 0 #0a3010;}
.btn-r{display:block;width:100%;padding:10px;
  background:linear-gradient(180deg,#aa3a3a,#702020);
  border:2px solid #ff6060;border-radius:6px;color:#fff;
  font-weight:bold;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  text-align:center;cursor:pointer;box-shadow:0 3px 0 #300a0a;}
.btn-r:active{transform:translateY(1px);}
.race-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.rcard{padding:8px 4px;background:#1a1408;border:2px solid #5a4020;
  border-radius:5px;cursor:pointer;text-align:center;}
.rcard.sel{border-color:var(--gold2);background:#3a2010;box-shadow:0 0 8px rgba(240,200,88,.4);}
.rcard .rg{font-size:22px;line-height:1;margin-bottom:3px;}
.rcard .rn{font-size:11px;font-weight:bold;color:var(--gold2);}
.rcard .rb{font-size:9px;color:#a08050;margin-top:1px;}

/* ===== ИГРА ===== */
#app{position:fixed;inset:0;display:grid;grid-template-rows:auto auto 1fr auto;}
#sbar{height:30px;background:linear-gradient(180deg,var(--red2),var(--red));
  border-bottom:2px solid var(--gold3);
  display:flex;align-items:center;justify-content:space-between;padding:0 10px;}
#sbar .stitle{color:var(--gold2);font-weight:bold;font-size:14px;letter-spacing:2px;}
#sbar .conn{font-size:11px;font-weight:bold;}
#sbar .conn.on{color:#5cff7a;}
#sbar .conn.off{color:#ff5050;}
#topbar{background:linear-gradient(180deg,#0a0604,#180a02);
  border-bottom:2px solid var(--gold);padding:3px 4px;
  display:flex;gap:1px;flex-wrap:nowrap;overflow:hidden;}
.ri{flex:1;display:flex;align-items:center;gap:2px;
  background:rgba(0,0,0,.5);border:1px solid var(--gold3);
  border-radius:3px;padding:2px 4px;min-width:0;font-size:11px;}
.ri img{width:13px;height:13px;image-rendering:pixelated;flex-shrink:0;}
.ri span{font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ri.low span{color:#ff8080;}
.ri.full span{color:#ffd44a;}
#main{position:relative;overflow:hidden;}
#mapwrap{position:absolute;inset:0;overflow:hidden;touch-action:none;}
#canvas{display:block;}

/* ── БОКОВАЯ ПАНЕЛЬ — плавная, не перекрывает кнопку ── */
/* Боковая кнопка — фиксированная по центру экрана */
#side-wrap{
  position:absolute;
  top:50%;right:0;
  transform:translateY(-50%);
  display:flex;align-items:center;
  z-index:8;pointer-events:none;
}
#sidebtn{
  width:28px;height:60px;
  background:linear-gradient(180deg,#9a6a30,#6a4010);
  border:2px solid var(--gold);border-right:0;
  border-radius:8px 0 0 8px;
  color:var(--gold2);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;cursor:pointer;
  flex-shrink:0;
  box-shadow:-2px 0 8px rgba(0,0,0,.5);
}
#sidebtn:active{filter:brightness(.85);}
#sidepanel{
  overflow:hidden;max-height:0;width:52px;
  background:linear-gradient(180deg,var(--wood2),var(--dark));
  border:0 solid var(--gold);border-right:0;
  border-radius:8px 0 0 8px;
  transition:max-height .3s cubic-bezier(.4,0,.2,1),
             border-width .3s,padding .3s;
  display:flex;flex-direction:column;gap:4px;
  padding:0 4px;pointer-events:all;
  align-items:center;
}
#sidepanel.open{
  max-height:320px;
  border-width:2px;
  padding:8px 4px;
}
#sidepanel .sb{
  width:42px;height:42px;flex-shrink:0;
  background:linear-gradient(180deg,#c08840,#8a5a20);
  border:2px solid var(--gold);border-radius:5px;
  font-size:20px;display:flex;align-items:center;justify-content:center;
}
#sidepanel .sb:active{filter:brightness(.85);}

#timebar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.8);color:#fff;padding:2px 10px;border-radius:10px;
  font-size:12px;font-family:monospace;font-weight:bold;z-index:5;
  border:1px solid rgba(255,255,255,.15);pointer-events:none;}

/* Нижняя панель */
#bottombar{
  background:linear-gradient(0deg,#050302,#150902);
  border-top:2px solid var(--gold);
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:2px;padding:3px;z-index:10;
}
.tab{padding:3px 1px 5px;
  background:linear-gradient(180deg,#3a1f10,#1a0a05);
  border:2px solid var(--gold3);border-radius:4px;
  color:var(--gold);font-size:9px;font-weight:bold;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px;
  text-transform:uppercase;position:relative;}
.tab .ti{font-size:20px;line-height:1;}
.tab.active{background:linear-gradient(180deg,#5a3018,#2a1408);
  border-color:var(--gold2);color:var(--gold2);}
.tab:active{filter:brightness(1.3);}
.tab .badge{position:absolute;top:-5px;right:-3px;
  background:#c00;color:#fff;font-size:9px;font-weight:bold;
  border-radius:8px;padding:1px 4px;min-width:14px;text-align:center;
  border:1px solid var(--dark);}

/* Тосты */
#toasts{position:fixed;top:44px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;gap:4px;
  pointer-events:none;width:90%;max-width:380px;}
.toast{background:rgba(10,4,2,.97);border:1px solid var(--gold);
  color:var(--gold2);padding:7px 12px;border-radius:4px;font-size:13px;
  text-align:center;animation:tsin .2s,tout .25s 2.7s forwards;
  box-shadow:0 4px 12px rgba(0,0,0,.7);}
.toast.err{border-color:#c44;color:#ffb0b0;}
.toast.ok{border-color:#5cff7a;color:#c8ffc8;}
@keyframes tsin{from{opacity:0;transform:translateY(-10px);}}
@keyframes tout{to{opacity:0;}}

/* Модалки */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:8px;
  animation:fadein .15s;}
@keyframes fadein{from{opacity:0;}}
.mbox{background:var(--wood);border:2px solid var(--gold);
  border-radius:6px;max-width:450px;width:100%;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.9);}
.mhead{background:linear-gradient(180deg,var(--red2),var(--red));
  color:#fff;padding:8px 12px;font-size:14px;font-weight:bold;
  text-align:center;border-bottom:2px solid var(--gold3);
  position:relative;letter-spacing:1px;}
.mhead .xb{position:absolute;top:50%;right:8px;transform:translateY(-50%);
  width:26px;height:26px;background:linear-gradient(180deg,#c44,#722);
  border:1px solid #fff;border-radius:3px;font-size:14px;
  color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center;}
.mbody{flex:1;overflow-y:auto;padding:12px;
  background:repeating-linear-gradient(0deg,var(--wood) 0 3px,#3a1a08 3px 6px);
  color:#e8d0b0;font-size:13px;line-height:1.5;}
.mbody p{margin-bottom:5px;}
.mfoot{padding:8px 12px;background:linear-gradient(0deg,var(--dark),var(--wood));
  border-top:1px solid var(--gold3);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.mbtn{padding:9px 14px;background:linear-gradient(180deg,#3a8a4a,var(--green2));
  color:#fff;border:2px solid #5cff7a;border-radius:5px;font-weight:bold;
  font-size:12px;letter-spacing:1px;text-transform:uppercase;min-width:90px;}
.mbtn:active{transform:translateY(1px);}
.mbtn:disabled{opacity:.4;cursor:not-allowed;border-color:#666;}
.mbtn.red{background:linear-gradient(180deg,#c43a3a,#5a1414);border-color:#ff5050;}
.mbtn.gold{background:linear-gradient(180deg,#c4a030,#7a5010);border-color:var(--gold2);color:#1a0800;text-shadow:none;}
.mbtn.gray{background:linear-gradient(180deg,#5a4a30,#2a2010);border-color:#8a7050;}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px;}
.bcard{background:linear-gradient(180deg,#5a3018,#2a1008);
  border:2px solid var(--gold3);border-radius:4px;padding:7px 5px;
  cursor:pointer;text-align:center;}
.bcard:hover{border-color:var(--gold2);transform:translateY(-1px);}
.bcard.cant{opacity:.4;cursor:not-allowed;}
.bcard img{width:42px;height:42px;image-rendering:pixelated;margin:0 auto 3px;display:block;object-fit:contain;}
.bcard .bn{font-size:11px;font-weight:bold;color:var(--gold2);line-height:1.2;margin-bottom:3px;}
.bcard .bc{font-size:10px;color:#c0a880;line-height:1.4;}
.mbar{height:10px;background:rgba(0,0,0,.5);border:1px solid var(--gold3);
  border-radius:5px;overflow:hidden;margin:5px 0;}
.mbar-f{height:100%;background:linear-gradient(90deg,#5cffe0,#00c880);}
.urow{background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:4px;padding:8px;margin-bottom:6px;}
.urow .uh{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
.urow img{image-rendering:pixelated;flex-shrink:0;}
.urow .un{font-weight:bold;color:var(--gold2);font-size:13px;}
.urow .us{font-size:11px;color:#b0a080;}
.urow .uc{font-size:11px;color:#e0c890;margin-bottom:4px;}
.urow .ui{display:flex;gap:5px;align-items:center;}
.urow input{width:55px;padding:5px;background:#0a2010;
  border:2px solid var(--gold);color:#70ff70;
  border-radius:4px;font-family:inherit;font-size:12px;text-align:center;outline:none;}
/* Технологии */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;}
.tcard{background:linear-gradient(180deg,#1a2a3a,#0a1a2a);
  border:2px solid #3a5a7a;border-radius:5px;padding:8px;cursor:pointer;}
.tcard:hover{border-color:#5a8aaa;}
.tcard.done{border-color:#3a8a4a;background:linear-gradient(180deg,#1a3a1a,#0a2a0a);}
.tcard.cant{opacity:.45;cursor:not-allowed;}
.tcard .tn{font-weight:bold;color:#7ad4ff;font-size:12px;margin-bottom:3px;}
.tcard.done .tn{color:#7aff7a;}
.tcard .td{font-size:10px;color:#a0b0c0;line-height:1.3;}

/* ЧАТ */
#chat-btn{
  position:fixed;bottom:68px;right:8px;
  width:46px;height:46px;
  background:linear-gradient(180deg,#c08840,#7a4a10);
  border:2px solid var(--gold2);border-radius:50%;
  font-size:20px;display:none;align-items:center;justify-content:center;
  z-index:20;box-shadow:0 3px 10px rgba(0,0,0,.5);}
#chat-btn:active{transform:scale(.9);}
#chat-nb{position:absolute;top:-4px;right:-4px;
  background:#e03030;color:#fff;font-size:9px;font-weight:bold;
  border-radius:50%;min-width:16px;height:16px;
  display:none;align-items:center;justify-content:center;
  border:2px solid var(--dark);padding:0 2px;}
#chat-panel{
  position:fixed;bottom:68px;right:8px;
  width:min(320px,calc(100vw - 16px));
  height:min(460px,calc(100vh - 150px));
  background:linear-gradient(180deg,#1a0e05,#0a0604);
  border:2px solid var(--gold);border-radius:10px;
  display:flex;flex-direction:column;z-index:21;
  box-shadow:0 8px 32px rgba(0,0,0,.9);overflow:hidden;
  transform:scale(0) translateY(16px);transform-origin:bottom right;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1);
  pointer-events:none;opacity:0;}
#chat-panel.open{transform:scale(1) translateY(0);pointer-events:all;opacity:1;}
#chat-head{background:linear-gradient(180deg,var(--red2),var(--red));
  padding:7px 10px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:2px solid var(--gold3);flex-shrink:0;}
#chat-head span{font-size:14px;font-weight:bold;color:var(--gold2);}
#chat-head button{width:24px;height:24px;background:linear-gradient(180deg,#c44,#722);
  border:1px solid #fff;border-radius:3px;color:#fff;font-size:14px;font-weight:bold;}
#chat-msgs{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:3px;}
#chat-msgs::-webkit-scrollbar{width:3px;}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px;}
.cmsg{padding:4px 7px;background:rgba(255,255,255,.04);
  border-left:2px solid var(--gold3);border-radius:0 3px 3px 0;
  font-size:12px;line-height:1.4;word-break:break-word;}
.cmsg.me{background:rgba(212,162,54,.1);border-left-color:var(--gold2);}
.cmsg.sys{border-left-color:#5cff7a;color:#5cff7a;text-align:center;}
.cmsg .ch{display:flex;gap:4px;align-items:center;margin-bottom:2px;}
.cmsg .cr{font-size:13px;}
.cmsg .cn{font-weight:bold;font-size:10px;color:var(--gold2);}
.cmsg .ct{font-size:9px;color:#604030;margin-left:auto;font-family:monospace;}
.cmsg .cx{color:#e0c890;font-size:12px;}
#chat-irow{display:flex;gap:5px;padding:7px;
  border-top:1px solid var(--gold3);background:rgba(0,0,0,.3);flex-shrink:0;}
#chat-inp{flex:1;background:#0a1a0a;border:2px solid var(--gold3);
  color:#e0d0b0;padding:7px 9px;border-radius:5px;
  font-family:inherit;font-size:12px;outline:none;}
#chat-inp:focus{border-color:var(--gold2);}
#chat-send{width:38px;height:38px;background:linear-gradient(180deg,#3a8a4a,#1d4a26);
  border:2px solid #5cff7a;border-radius:5px;font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#chat-send:active{transform:scale(.9);}

@media(max-width:360px){
  .tab{font-size:8px;}.tab .ti{font-size:17px;}
  .ri{font-size:10px;}
  .bgrid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-logo">
    <span class="t1">СРЕДНЕВЕКОВЬЕ</span>
    <span class="t2">Война Королей</span>
  </div>
  <div class="parch" id="aLogin">
    <div class="rl"></div><div class="rr"></div>
    <h3>Логин</h3>
    <input type="text" id="liU" placeholder="Имя игрока (мин. 3)">
    <h3>Пароль</h3>
    <input type="password" id="liP" placeholder="Пароль">
    <div class="err" id="liE"></div>
    <button class="btn-g" id="liBtn">ВОЙТИ</button>
    <button class="btn-r" id="toReg">РЕГИСТРАЦИЯ</button>
    <div class="sw">Нет аккаунта? <a id="sw1">Создать</a></div>
  </div>
  <div class="parch" id="aReg" style="display:none;">
    <div class="rl"></div><div class="rr"></div>
    <div style="font-size:13px;color:#f0d070;text-align:center;margin-bottom:10px;font-weight:bold;">
      Правитель, укажи данные<br>для создания королевства!
    </div>
    <h3>Логин</h3>
    <input type="text" id="reU" placeholder="Имя игрока (мин. 3)" maxlength="20">
    <h3>Пароль</h3>
    <input type="password" id="reP" placeholder="Пароль (мин. 4)" maxlength="40">
    <h3>Название королевства</h3>
    <input type="text" id="reK" placeholder="Как называть твоё королевство" maxlength="20">
    <h3>Раса</h3>
    <div class="race-grid" id="racePick"></div>
    <div class="err" id="reE"></div>
    <button class="btn-g" id="reBtn">ОСНОВАТЬ КОРОЛЕВСТВО</button>
    <button class="btn-r" id="sw2">НАЗАД</button>
  </div>
</div>

<!-- ИГРА -->
<div id="app" style="display:none;">
  <div id="sbar">
    <span class="stitle">СРЕДНЕВЕКОВЬЕ</span>
    <span class="conn off" id="conn">● OFF</span>
  </div>
  <div id="topbar"></div>
  <div id="main">
    <div id="mapwrap"><canvas id="canvas"></canvas></div>
    <div id="side-wrap">
      <button id="sidebtn">▶</button>
      <div id="sidepanel">
        <button class="sb" data-a="army" title="Армия">⚔</button>
        <button class="sb" data-a="tech" title="Технологии">🔬</button>
        <button class="sb" data-a="reports" title="Отчёты">📨</button>
        <button class="sb" data-a="profile" title="Профиль">👑</button>
        <button class="sb" data-a="logout" title="Выход">🚪</button>
      </div>
    </div>
    <div id="timebar">--:--:--</div>
  </div>
  <div id="bottombar">
    <button class="tab active" data-loc="castle"><span class="ti">🏰</span>Замок</button>
    <button class="tab" data-loc="lands"><span class="ti">🌾</span>Земли</button>
    <button class="tab" data-loc="world"><span class="ti">🌍</span>Мир</button>
    <button class="tab" data-loc="army"><span class="ti">⚔</span>Армия</button>
    <button class="tab" data-loc="menu"><span class="ti">📜</span>Меню</button>
  </div>
</div>

<div id="toasts"></div>
<button id="chat-btn">💬<span id="chat-nb"></span></button>
<div id="chat-panel">
  <div id="chat-head"><span>💬 Мировой чат</span><button id="chat-close">✕</button></div>
  <div id="chat-msgs"></div>
  <div id="chat-irow">
    <input type="text" id="chat-inp" placeholder="Написать..." maxlength="200">

function fmtN(n){n=Math.floor(n);return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e4?(n/1e3).toFixed(0)+'k':String(n);}
function fmtT(s){s=Math.max(0,Math.ceil(s));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?h+'ч '+m+'м':m?m+'м '+sec+'с':sec+'с';}
function clk(){return new Date().toTimeString().slice(0,8);}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function calcCost(id,lv){const b=BASE_COSTS[id]||{};const m=Math.pow(1.6,lv);
  return{wood:Math.round((b.wood||0)*m),stone:Math.round((b.stone||0)*m),
         iron:Math.round((b.iron||0)*m),food:Math.round((b.food||0)*m)};}
function calcTime(id,lv,clvl){return Math.max(5,Math.round((BASE_TIMES[id]||60)*Math.pow(1.4,lv)*Math.pow(0.92,(clvl||1)-1)));}
function canAfford(c){for(const k in c)if((S.player.res[k]||0)<c[k])return false;return true;}
function getCLvl(){const c=(S.player.castle||[]).find(x=>x.bldId==='castle');return c?c.level:1;}
function reqOk(id,cells){
  const def=BUILDINGS[id]||LAND_BUILDINGS[id]||TECHS[id];if(!def?.req)return true;
  for(const k in def.req){
    let l=0;
    for(const c of (cells||S.player.castle))if(c.bldId===k)l=Math.max(l,c.level);
    if(l<def.req[k])return false;
  }
  return true;
}
function hasU(id){if(!BUILDINGS[id]?.unique)return false;return(S.player.castle||[]).some(c=>c.bldId===id);}
function armyTotal(){return Object.values(S.player.army||{}).reduce((a,b)=>a+(+b||0),0);}
function costHtml(c){return Object.entries(c).filter(([,v])=>v>0).map(([k,v])=>{
  const ok=(S.player.res[k]||0)>=v;
  return `<span style="color:${ok?'#7aff7a':'#ff7a7a'}">${RES_L[k]||k}:${fmtN(v)}</span>`;
}).join(' ');}
function toast(msg,kind=''){
  const el=document.createElement('div');

// ── API ────────────────────────────────────────────────
async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',
    headers:{'Content-Type':'application/json'},...opts,
    body:opts.body?JSON.stringify(opts.body):undefined});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||'HTTP '+r.status);
  return d;
}
async function refreshState(){
  S=await api('/api/state');
  if(S.player.techs)playerTechs=S.player.techs;
  renderTopbar();renderMap();
}

// ── WS ─────────────────────────────────────────────────
function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/`);
  ws.onopen=()=>setConn(true);
  ws.onclose=()=>{setConn(false);setTimeout(connectWS,3000);};
  ws.onerror=()=>{};
  ws.onmessage=ev=>{
    let m;try{m=JSON.parse(ev.data);}catch{return;}
    if(m.type==='state'){S.player=m.player;if(m.player.techs)playerTechs=m.player.techs;renderTopbar();renderMap();}
    else if(m.type==='reports'){for(const r of m.items){toast(r.txt,r.kind==='battle-loss'?'err':r.kind==='build'?'ok':'');if(r.kind==='build')setTimeout(()=>refreshState(),400);}}
    else if(m.type==='chat'){appendChat(m.msg);if(!chatOpen){chatUnread++;const b=$('#chat-nb');b.style.display='flex';b.textContent=chatUnread>99?'99+':chatUnread;}}
  };
}
function setConn(ok){const e=$('#conn');e.className='conn '+(ok?'on':'off');e.textContent=ok?'● ON':'● OFF';}

  if(!S?.player)return;
  const p=S.player;
  $('#topbar').innerHTML=RES.map(r=>{
    const v=p.res[r]||0,mx=p.resMax[r]||1;
    const cls=v>=mx?'full':v<mx*.1?'low':'';

      <span>${fmtN(v)}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  ШЕСТИУГОЛЬНАЯ СЕТКА (СОТЫ)
//  flat-top hex: ширина W, высота H = W*sin(60°)
//  центр гекса (col,row):
//    cx = ox + col*(W*3/4)              — если чётный ряд
//    cx = ox + col*(W*3/4)              — нечётный смещён на H/2
//    cy = oy + row*H + (col%2)*H/2
// ══════════════════════════════════════════════════════
let hexSize = 52;  // радиус описанной окружности (размер гекса)
let vpX=0,vpY=0;

function hexW(R){return R*2;}
function hexH(R){return Math.round(R*Math.sqrt(3));}
// Центр гекса col,row
function hexCenter(col,row,R){
  const W=hexW(R),H=hexH(R);
  const x = col*(W*0.75);
  const y = row*H + (col%2)*(H/2);
  return {x,y};
}
// Вершины гекса (flat-top)
function hexPoints(cx,cy,R){
  const pts=[];
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i;
    pts.push({x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)});
  }
  return pts;
}

// Цвет заливки гекса по типу
function hexFill(c,loc,col,row,cols,rows){
  if(loc==='castle'){
    // Центральный гекс (ратуша) — золотистый
    const cx=Math.floor(cols/2),cy=Math.floor(rows/2);
    const dist=Math.max(Math.abs(col-cx),Math.abs(row-cy));
    if(dist===0) return '#6a5a20';  // центр — золото
    if(dist===1) return '#5a7030';  // вокруг — светлее
    if(dist===2) return '#4a6828';  // средний пояс
    return '#3a5820';               // края
  }
  if(c.type==='forest')return '#2a5a18';
  if(c.type==='stone') return '#58524a';
  if(c.type==='grass') return '#4a7a28';
  if(c.type==='player')return '#3a4a7a';
  if(c.type==='bandit')return '#5a3a18';
  if(c.type==='oasis') return '#2a6a4a';
  return '#4a6a2a';
}
function hexStroke(c,loc,col,row,cols,rows){
  if(loc==='castle'){
    const cx=Math.floor(cols/2),cy=Math.floor(rows/2);
    const dist=Math.max(Math.abs(col-cx),Math.abs(row-cy));
    if(dist===0) return 'rgba(212,162,54,.8)';  // золотой ободок у ратуши
    if(dist===1) return 'rgba(160,130,60,.5)';
    return 'rgba(0,0,0,.3)';
  }
  if(c.type==='forest')return 'rgba(0,0,0,.4)';
  if(c.type==='stone') return 'rgba(0,0,0,.4)';
  return 'rgba(0,0,0,.3)';
}

let hitHexes=[];

function renderMap(){
  if(!S?.player)return;
  $('#main').className='loc-'+LOC;
  if(LOC==='castle')drawHexGrid(S.player.castle,CASTLE_COLS,CASTLE_ROWS,'castle');
  else if(LOC==='lands')drawHexGrid(S.player.lands,LANDS_COLS,LANDS_ROWS,'lands');
  else drawWorldHex();
}

function calcHexSize(cols,rows,W,H){
  // Подбираем размер гекса чтобы вся сетка влезла в экран
  // Flat-top hex grid, cols колонн, rows строк
  // Ширина сетки ≈ cols*(R*1.5) + R*0.5
  // Высота сетки ≈ rows*H + H/2
  for(let R=80;R>=18;R-=2){
    const gw=(cols*(R*1.5)+R*0.5)*1.05;
    const gh=(rows*hexH(R)+hexH(R)*0.5)*1.05;
    if(gw<=W && gh<=H)return R;
  }
  return 18;
}

function drawHexGrid(cells,cols,rows,loc){
  const canvas=$('#canvas');
  const mw=$('#main').clientWidth,mh=$('#main').clientHeight;
  const dpr=devicePixelRatio||1;
  canvas.width=mw*dpr;canvas.height=mh*dpr;
  canvas.style.width=mw+'px';canvas.style.height=mh+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Размер гекса — подбираем чтобы влезло
  const R=calcHexSize(cols,rows,mw,mh);
  hexSize=R;

  const W=hexW(R),H=hexH(R);
  // Границы сетки
  const gridW=cols*(R*1.5)+R*0.5;
  const gridH=rows*H+H*0.5;
  const ox=(mw-gridW)/2+vpX;
  const oy=(mh-gridH)/2+vpY;

  // Фон
  ctx.fillStyle=loc==='castle'?'#2a4a18':'#1a3a0a';
  ctx.fillRect(0,0,mw,mh);

  hitHexes=[];
  const now=Date.now();
  const queue=S.player.queue||[];

  // Сортировка по row потом col для правильного z-order
  const sorted=[...cells].filter(c=>c.type!=='wall').sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);

  for(const c of sorted){
    const {x:hx,y:hy}=hexCenter(c.col,c.row,R);
    const cx2=ox+hx+R,cy2=oy+hy+H/2;
    const pts=hexPoints(cx2,cy2,R);

    // Заливка
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.fillStyle=hexFill(c,loc,c.col,c.row,cols,rows);
    ctx.fill();
    // Тонкая внутренняя тень
    if(loc==='castle'){
      ctx.save();
      ctx.clip();
      const grd=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,R);
      grd.addColorStop(0,'rgba(255,255,200,.08)');
      grd.addColorStop(1,'rgba(0,0,0,.25)');
      ctx.fillStyle=grd;ctx.fill();
      ctx.restore();
    }
    ctx.strokeStyle=hexStroke(c,loc,c.col,c.row,cols,rows);
    ctx.lineWidth=loc==='castle'?2:1.5;
    ctx.stroke();

    // Декор биома
    if(loc==='lands'&&!c.bldId){
      let dk=null;
      if(c.type==='forest')dk='ground/lumber.png';
      else if(c.type==='stone')dk='ground/mount.png';
      if(dk){
        const di=gi(dk);
        if(di?.complete&&di.naturalWidth){
          const dw=Math.round(R*1.3),dh=Math.round(di.naturalHeight/di.naturalWidth*dw);
          ctx.drawImage(di,cx2-dw/2,cy2-dh*0.75,dw,dh);
        }
      }
    }

    // Здание
    if(c.bldId){
      const def=BUILDINGS[c.bldId]||LAND_BUILDINGS[c.bldId];
      if(def){
        // Для добывающих зданий — разный спрайт по уровню
        let imgKey=def.img;
        if(def.lvlImg){
          const li=def.lvlImg;
          imgKey=c.level<=1?li[0]:c.level<=4?li[1]:li[2];
        }
        const bi=gi(imgKey);
        if(bi?.complete&&bi.naturalWidth){
          const bw=Math.round(R*1.5),bh=Math.round(bi.naturalHeight/bi.naturalWidth*bw);
          ctx.drawImage(bi,cx2-bw/2,cy2-bh*0.8,bw,bh);
        }
        // Уровень
        if(c.level>0){
          ctx.fillStyle='rgba(0,0,0,.75)';
          ctx.beginPath();ctx.arc(cx2+R*0.55,cy2-R*0.55,8,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#f0c958';ctx.font='bold 9px monospace';ctx.textAlign='center';
          ctx.fillText(c.level,cx2+R*0.55,cy2-R*0.55+3);
        }
      }
    }

    // Декор пустых гексов замка
    if(loc==='castle' && !c.bldId && c.type==='inner'){
      const cx2f=Math.floor(cols/2),cy2f=Math.floor(rows/2);
      const dist2=Math.max(Math.abs(c.col-cx2f),Math.abs(c.row-cy2f));
      // Мощение вокруг центра
      if(dist2===1){
        ctx.strokeStyle='rgba(180,150,80,.3)';ctx.lineWidth=1;
        // Ромбики мощения
        for(let di=0;di<4;di++){
          const tx=cx2+(Math.random()-.5)*R*0.8,ty=cy2+(Math.random()-.5)*R*0.5;
          ctx.strokeRect(tx-3,ty-2,6,4);
        }
      }
      // Трава на дальних
      if(dist2>=2){
        ctx.fillStyle='rgba(80,120,40,.2)';
        for(let gi=0;gi<3;gi++){
          const gx=cx2+(Math.random()-.5)*R*1.2,gy=cy2+(Math.random()-.5)*R*0.7;
          ctx.fillRect(gx-1,gy-4,2,8);
          ctx.fillRect(gx-3,gy-2,6,2);
        }
      }
    }

    // В очереди
    const inQ=queue.find(j=>j.loc===loc&&j.col===c.col&&j.row===c.row);
    if(inQ){
      // Пульсирующий контур
      const a=0.4+0.3*Math.sin(now/400);
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();
      ctx.strokeStyle=`rgba(255,200,0,${a})`;ctx.lineWidth=3;ctx.stroke();
      // Иконка
      ctx.font=`${Math.round(R*0.5)}px serif`;ctx.textAlign='center';
      ctx.fillText('🏗',cx2,cy2+R*0.2);
      // Прогресс
      const elapsed=now-inQ.start,total=inQ.end-inQ.start;
      const pct=Math.min(1,Math.max(0,elapsed/total));
      const bw=R*1.2,bx=cx2-bw/2,by=cy2+R*0.6;
      ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(bx,by,bw,5);
      ctx.fillStyle=`hsl(${120*pct},100%,50%)`;ctx.fillRect(bx,by,bw*pct,5);
      // Таймер
      const rem=Math.ceil((inQ.end-now)/1000);
      ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(cx2-R*0.7,by+6,R*1.4,13);
      ctx.fillStyle='#ffd44a';ctx.font=`bold 9px monospace`;ctx.textAlign='center';
      ctx.fillText('⌛'+fmtT(rem),cx2,by+16);
    }

    hitHexes.push({col:c.col,row:c.row,cx:cx2,cy:cy2,R,type:c.type,data:c});
  }
}

function drawWorldHex(){
  const canvas=$('#canvas');
  const mw=$('#main').clientWidth,mh=$('#main').clientHeight;
  const dpr=devicePixelRatio||1;
  canvas.width=mw*dpr;canvas.height=mh*dpr;
  canvas.style.width=mw+'px';canvas.style.height=mh+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const R=calcHexSize(WORLD_COLS,WORLD_ROWS,mw,mh);
  const W=hexW(R),H=hexH(R);
  const gridW=WORLD_COLS*(R*1.5)+R*0.5;
  const gridH=WORLD_ROWS*H+H*0.5;
  const ox=(mw-gridW)/2+vpX;
  const oy=(mh-gridH)/2+vpY;

  ctx.fillStyle='#2a4a18';ctx.fillRect(0,0,mw,mh);

  hitHexes=[];
  const myName=S.player.username;
  const castleS=gi('ground/castle_small.png');
  const banditS=gi('ground/bandit_camp.png');
  const sorted=[...S.world].sort((a,b)=>a.row!==b.row?a.row-b.row:a.col-b.col);

  for(const c of sorted){
    const {x:hx,y:hy}=hexCenter(c.col,c.row,R);
    const cx2=ox+hx+R,cy2=oy+hy+H/2;
    const pts=hexPoints(cx2,cy2,R);

    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.fillStyle=hexFill(c,'world');ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;ctx.stroke();

    if(c.type==='player'){
      const isMe=c.player===myName;
      if(castleS?.complete&&castleS.naturalWidth){
        const cw=Math.round(R*1.8),ch=Math.round(castleS.naturalHeight/castleS.naturalWidth*cw);
        ctx.drawImage(castleS,cx2-cw/2,cy2-ch*0.75,cw,ch);
      }
      if(isMe){
        ctx.strokeStyle='#f0c958';ctx.lineWidth=2.5;
        ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
        for(let i=1;i<6;i++)ctx.lineTo(pts[i].x,pts[i].y);
        ctx.closePath();ctx.stroke();
      }
      // Подпись
      const lbl=isMe?'★'+(c.player||''):c.player||'';
      ctx.fillStyle='rgba(0,0,0,.8)';
      const tw=Math.max(40,ctx.measureText(lbl).width+8);
      ctx.fillRect(cx2-tw/2,cy2+R*0.5,tw,13);
      ctx.fillStyle=isMe?'#f0c958':'#e0d0b0';
      ctx.font=`${Math.max(8,Math.round(R*0.28))}px Arial`;ctx.textAlign='center';
      ctx.fillText(lbl,cx2,cy2+R*0.5+10);
    } else if(c.type==='bandit'){
      if(banditS?.complete&&banditS.naturalWidth){
        const bw=Math.round(R*1.6),bh=Math.round(banditS.naturalHeight/banditS.naturalWidth*bw);
        ctx.drawImage(banditS,cx2-bw/2,cy2-bh*0.75,bw,bh);
      } else {ctx.font=`${R*0.7}px serif`;ctx.textAlign='center';ctx.fillText('🐺',cx2,cy2+R*0.3);}
      ctx.fillStyle='rgba(0,0,0,.8)';
      const pw='⚔'+c.power;const twp=ctx.measureText(pw).width+6;
      ctx.fillRect(cx2-twp/2,cy2+R*0.5,twp,13);
      ctx.fillStyle='#ff9080';ctx.font=`bold ${Math.max(8,Math.round(R*0.28))}px Arial`;ctx.textAlign='center';
      ctx.fillText(pw,cx2,cy2+R*0.5+10);
    } else if(c.type==='oasis'){
      const rg={wood:'🌲',stone:'⛰',iron:'⛏',food:'🌾',gold:'🪙'}[c.resource]||'💎';
      ctx.font=`${R*0.8}px serif`;ctx.textAlign='center';
      ctx.fillText(rg,cx2,cy2+R*0.3);
    }

    hitHexes.push({col:c.col,row:c.row,cx:cx2,cy:cy2,R,type:c.type,data:c});
  }
}

// ── КЛИКИ ──────────────────────────────────────────────
function hitTestHex(px,py,cx,cy,R){
  // Расстояние от центра с учётом формы гекса
  const dx=Math.abs(px-cx),dy=Math.abs(py-cy);
  return dx<=R && dy<=hexH(R)/2 && dx/(R)+dy/(hexH(R)/2)<=1.0;
}
function onCanvasClick(px,py){
  if(!S?.player)return;
  // Ищем с конца (ближние сверху)
  for(let i=hitHexes.length-1;i>=0;i--){
    const h=hitHexes[i];
    if(hitTestHex(px,py,h.cx,h.cy,h.R)){
      if(LOC==='world'){showWorldModal(h.data||{col:h.col,row:h.row,type:h.type});}
      else{
        const cells=LOC==='castle'?S.player.castle:S.player.lands;
        const cell=cells.find(c=>c.col===h.col&&c.row===h.row);
        if(cell&&cell.type!=='wall')onCellClick(cell);
      }
      break;
    }
  }
}

// ── DRAG ───────────────────────────────────────────────
function initDrag(){
  const mw=$('#mapwrap');
  const ptr=e=>e.touches?.[0]??e.changedTouches?.[0]??e;
  let sx=0,sy=0,svx=0,svy=0,moved=false;
  const dn=e=>{const p=ptr(e);sx=p.clientX;sy=p.clientY;svx=vpX;svy=vpY;moved=false;};
  const mv=e=>{
    const p=ptr(e);const dx=p.clientX-sx,dy=p.clientY-sy;
    if(!moved&&(Math.abs(dx)>6||Math.abs(dy)>6))moved=true;
    if(!moved)return;
    vpX=svx+dx;vpY=svy+dy;
    renderMap();
  };
  const up=()=>{if(moved){mw.dataset.dragged='1';setTimeout(()=>mw.dataset.dragged='',80);}};
  mw.addEventListener('mousedown',dn);mw.addEventListener('touchstart',dn,{passive:true});
  mw.addEventListener('mousemove',mv);mw.addEventListener('touchmove',mv,{passive:true});
  window.addEventListener('mouseup',up);mw.addEventListener('touchend',up);
  mw.addEventListener('click',e=>{
    if(mw.dataset.dragged==='1')return;
    const rect=$('#canvas').getBoundingClientRect();
    const dpr=devicePixelRatio||1;
    // Нужно учесть масштаб canvas
    const scaleX=($('#canvas').width/dpr)/rect.width;
    const scaleY=($('#canvas').height/dpr)/rect.height;
    onCanvasClick((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
  });
  window.addEventListener('resize',()=>{vpX=0;vpY=0;renderMap();});
  // Двойной тап — сброс позиции
  let lastTap=0;
  mw.addEventListener('touchend',()=>{
    const now=Date.now();
    if(now-lastTap<300){vpX=0;vpY=0;renderMap();}
    lastTap=now;
  });
}

// Анимационный цикл — только если есть очередь
let afId=null;
function startAnim(){
  if(afId)return;
  const loop=()=>{
    const hasQ=(S?.player?.queue||[]).filter(j=>j.loc===LOC).length>0;
    if(hasQ)renderMap();
    afId=requestAnimationFrame(loop);
  };
  afId=requestAnimationFrame(loop);
}

// ── МОДАЛКИ ────────────────────────────────────────────
function modal({title,body,actions=[]}){
  const bg=document.createElement('div');bg.className='mbg';
  const m=document.createElement('div');m.className='mbox';
  m.innerHTML=`<div class="mhead">${title}<button class="xb">✕</button></div>`;
  const bd=document.createElement('div');bd.className='mbody';
  if(typeof body==='string')bd.innerHTML=body;
  else if(Array.isArray(body))body.forEach(x=>bd.appendChild(x));
  else bd.appendChild(body);
  m.appendChild(bd);
  if(actions.length){
    const ft=document.createElement('div');ft.className='mfoot';
    actions.forEach(a=>{
      const b=document.createElement('button');b.className='mbtn '+(a.kind||'');b.textContent=a.label;
      if(a.disabled)b.disabled=true;
      b.onclick=async()=>{if(a.handler)await a.handler(bg);if(a.close!==false)bg.remove();};
      ft.appendChild(b);
    });
    m.appendChild(ft);
  }
  bg.appendChild(m);m.querySelector('.xb').onclick=()=>bg.remove();
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);return bg;
}

function onCellClick(cell){
  const inQ=(S.player.queue||[]).find(j=>j.loc===LOC&&j.col===cell.col&&j.row===cell.row);
  if(inQ)return showJobModal(inQ);
  if(cell.bldId)return showBldModal(cell,LOC);
  showBuildPick(cell,LOC);
}

function showBuildPick(cell,loc){
  const isCastle=loc==='castle';
  const defs=isCastle?BUILDINGS:LAND_BUILDINGS;
  const clvl=getCLvl();
  const con=document.createElement('div');

  if(isCastle){
    // Группируем по категориям
    for(const [cat,catName] of Object.entries(BLD_CATS)){
      const catDefs=Object.entries(defs).filter(([id,d])=>d.cat===cat);
      if(!catDefs.length)continue;
      const h=document.createElement('div');
      h.style.cssText='font-size:12px;color:var(--gold2);margin:8px 0 5px;font-weight:bold;';
      h.textContent=catName;con.appendChild(h);
      const grid=document.createElement('div');grid.className='bgrid';
      catDefs.forEach(([id,def])=>{
        if(def.unique&&hasU(id)&&cell.bldId!==id)return;
        const rq=reqOk(id);
        const cost=calcCost(id,0),time=calcTime(id,0,clvl);
        const ok=canAfford(cost)&&rq;
        const s=spr(def.img);
        const card=document.createElement('div');card.className='bcard'+(ok?'':' cant');
        card.innerHTML=`${s?`<img src="${s}">`:'<div style="font-size:28px;margin:4px 0;">🏗</div>'}
          <div class="bn">${def.name}</div>
          <div class="bc">${costHtml(cost)}</div>
          <div class="bc" style="color:#8a8a6a;">⌛${fmtT(time)}</div>
          ${!rq?`<div class="bc" style="color:#ff8080;">🔒 Треб.</div>`:''}`;
        card.onclick=async()=>{
          if(!ok){toast(rq?'Не хватает ресурсов':'Требования не выполнены','err');return;}
          try{await api('/api/build',{method:'POST',body:{loc,col:cell.col,row:cell.row,bldId:id}});
            toast('Начато: '+def.name,'ok');bg.remove();await refreshState();}
          catch(err){toast(err.message,'err');}
        };
        grid.appendChild(card);
      });
      if(grid.children.length)con.appendChild(grid);
    }
  } else {
    // Земли — только по биому
    const grid=document.createElement('div');grid.className='bgrid';
    let cnt=0;
    for(const[id,def]of Object.entries(defs)){
      if(def.terrain&&def.terrain!==cell.type)continue;
      const cost=calcCost(id,0),time=calcTime(id,0,clvl);
      const ok=canAfford(cost);
      const s=spr(def.img);
      const card=document.createElement('div');card.className='bcard'+(ok?'':' cant');
      card.innerHTML=`${s?`<img src="${s}">`:'<div style="font-size:28px;margin:4px 0;">🌱</div>'}
        <div class="bn">${def.name}</div>
        <div class="bc">${costHtml(cost)}</div>
        <div class="bc" style="color:#8a8a6a;">⌛${fmtT(time)}</div>
        <div class="bc" style="color:#5cff7a;">+${def.produces?RES_L[def.produces]:''}/ч</div>`;
      card.onclick=async()=>{

function showAttackModal(target){
  const tn=target.type==='bandit'?'Анархистов':target.type==='oasis'?`Оазис ${RES_L[target.resource]||''}`:target.player||'?';
  const tp=target.type==='bandit'?(target.power||100):target.type==='oasis'?30:(target.lvl||1)*200;
  const con=document.createElement('div');
  con.innerHTML=`<p style="text-align:center;margin-bottom:8px;">Цель: <b style="color:var(--gold2);">${tn}</b> · Сила: <b>${tp}</b></p>`;
  const sumDiv=document.createElement('div');
  sumDiv.style.cssText='background:rgba(0,0,0,.4);padding:7px;border:1px solid var(--gold);border-radius:4px;margin-bottom:7px;text-align:center;font-size:12px;';
  con.appendChild(sumDiv);
  const sel={};
  function refresh(){
    let pow=0,cnt=0,slow=0;
    for(const uid in sel){const n=sel[uid];if(!n)continue;const u=UNITS[uid];pow+=n*(u?.atk||0);cnt+=n;slow=Math.max(slow,u?.speed||18);}
    const pos=S.player.worldPos||{col:0,row:0};
    const dist=Math.max(1,Math.abs(pos.col-target.col)+Math.abs(pos.row-target.row));
    const t=slow*dist;
    let out=cnt===0?'Выберите войска':pow>=tp*1.5?'<span style="color:#5cff7a;">Лёгкая победа</span>':pow>=tp?'<span style="color:#ffd44a;">Победа с потерями</span>':pow>=tp*.6?'<span style="color:#ff8a4a;">Тяжёлый бой</span>':'<span style="color:#ff5a5a;">Разгром</span>';
    sumDiv.innerHTML=`Войск: <b>${cnt}</b> · Сила: <b>${pow}</b> · ${out}<br>В пути: <b>${fmtT(t)}</b>`;
    const gb=bg.querySelector('.atkgo');if(gb)gb.disabled=cnt===0;
  }
  const list=document.createElement('div');
  for(const uid in S.player.army){
    const have=S.player.army[uid];if(!have)continue;
    const u=UNITS[uid];const s=spr(u?.simg);
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:7px;align-items:center;background:rgba(0,0,0,.3);padding:6px;border:1px solid var(--gold3);border-radius:4px;margin-bottom:4px;';
    row.innerHTML=`
      ${s?`<img src="${s}" width="22" height="22" style="image-rendering:pixelated;">`:'<span>⚔</span>'}
      <div style="flex:1;font-size:12px;"><b style="color:var(--gold2);">${u?.name||uid}</b>
      <div style="color:#a09060;">${have} в замке · ⚔${u?.atk}</div></div>
      <input type="number" class="ac" data-uid="${uid}" value="0" min="0" max="${have}"
        style="width:50px;padding:4px;background:#0a1a0a;border:2px solid var(--gold);color:#70ff70;border-radius:4px;font-family:inherit;font-size:12px;text-align:center;outline:none;">
      <button class="mbtn gray aal" data-uid="${uid}" style="padding:4px 7px;font-size:11px;min-width:auto;">Все</button>`;
    list.appendChild(row);
  }
  con.appendChild(list);
  const bg=modal({title:'⚔ Подготовка похода',body:con,actions:[
    {label:'Отправить войска',kind:'red',handler:async()=>{
      const cnt=Object.values(sel).reduce((a,b)=>a+b,0);
      if(!cnt){toast('Выберите войска','err');return;}
      try{await api('/api/attack',{method:'POST',body:{targetCol:target.col,targetRow:target.row,units:sel}});
        toast('Войско отправлено!','ok');await refreshState();}
      catch(e){toast(e.message,'err');}
    },close:true},
  ]});
  bg.querySelector('.mbtn.red').classList.add('atkgo');
  refresh();
  bg.querySelectorAll('.ac').forEach(inp=>{
    inp.oninput=()=>{const uid=inp.dataset.uid;sel[uid]=Math.max(0,Math.min(S.player.army[uid]||0,parseInt(inp.value)||0));inp.value=sel[uid];refresh();};
  });
  bg.querySelectorAll('.aal').forEach(btn=>{
    btn.onclick=()=>{const uid=btn.dataset.uid;const inp=bg.querySelector(`.ac[data-uid="${uid}"]`);inp.value=S.player.army[uid]||0;inp.dispatchEvent(new Event('input'));};
  });
}

const RATING_WEIGHTS_CLIENT = {
  castle:10,barracks:6,stables:6,smithy:5,university:8,
  magscool:7,magtower:7,market:5,treasury:6,temple:4,
  storage:3,workshop:4,guard_tower:4,alchimia:5,beer:3,
  secret:3,diplomat:5,resident:5,expedition:4,commerce:6,
  wisdom:3,gendel:4,spycentr:5,portal:15,traveler:8,arhcamp:6,
  farm_small:2,sawmill_small:2,stone_small:2,iron_small:2,house_small:2,
};
function clientRating(p){
  let pts=0;
  for(const c of [...(p.castle||[]),...(p.lands||[])]){
    if(!c.bldId||!c.level)continue;
    const w=RATING_WEIGHTS_CLIENT[c.bldId]||1;
    for(let lv=1;lv<=c.level;lv++) pts+=Math.round(w*lv*1.5);
  }
  for(const uid in (p.army||{})) pts+=Math.floor((p.army[uid]||0)*0.5);
  pts+=Object.keys(p.techs||{}).length*20;
  return pts;
}
function ratingDeltaClient(bldId,toLvl){
  return Math.round((RATING_WEIGHTS_CLIENT[bldId]||1)*toLvl*1.5);
}
function ratingTitle(pts){
  if(pts>=5000) return {t:'👑 Великий Король',c:'#f0c958'};
  if(pts>=2000) return {t:'⚔ Повелитель',c:'#c8a0ff'};
  if(pts>=800)  return {t:'🛡 Рыцарь',c:'#80c8ff'};
  if(pts>=300)  return {t:'🏹 Воин',c:'#80ff80'};
  if(pts>=100)  return {t:'🌱 Новичок',c:'#c8d890'};
  return {t:'🥚 Поселенец',c:'#a8a890'};
}

          ${hasPhoto
            ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">`
            : `<span>${avatar}</span>`}
        </div>
        <div style="position:absolute;bottom:0;right:0;width:22px;height:22px;
          background:var(--gold);border-radius:50%;border:2px solid var(--dark);
          display:flex;align-items:center;justify-content:center;font-size:12px;">✏️</div>
      </div>
      <!-- Инфо -->
      <div style="flex:1;">
        <div style="font-size:18px;font-weight:bold;color:var(--gold2);">${p.kingdom}</div>
        <div style="font-size:12px;color:#a89070;">@${p.username}</div>
        <div style="font-size:13px;color:#e0d0b0;margin-top:4px;">${RACES[p.race]?.name} ${RACE_G[p.race]||''}</div>
        <div style="margin-top:6px;font-size:14px;font-weight:bold;color:${rankColor};">${rankTitle}</div>
        ${p.isAdmin?`<div style="margin-top:5px;display:inline-block;background:rgba(60,0,0,.7);border:1px solid #c03030;border-radius:4px;padding:2px 10px;font-size:11px;color:#ff9090;font-weight:bold;letter-spacing:1px;">⚙ АДМИНИСТРАТОР</div>`:''}
      </div>
    </div>

    <!-- РЕЙТИНГОВАЯ КАРТОЧКА -->
    <div style="background:linear-gradient(135deg,#1a0e05,#2a1a08);border:1px solid var(--gold3);border-radius:8px;padding:12px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="color:var(--gold2);font-weight:bold;font-size:14px;">🏆 Рейтинг</span>
        <span style="font-size:22px;font-weight:bold;color:var(--gold2);">${fmtN(pts)}</span>
      </div>
      <!-- Прогресс до следующего ранга -->
      ${(()=>{
        const thresholds=[100,300,800,2000,5000,99999];
        const cur=thresholds.findIndex(t=>pts<t);
        const prev=cur>0?thresholds[cur-1]:0;
        const next=thresholds[cur]||9999;
        const pct=Math.min(100,(pts-prev)/(next-prev)*100);
        const nextRank=cur<thresholds.length-2?ratingTitle(next).t:'MAX';
        return `<div style="font-size:10px;color:#a08060;margin-bottom:4px;">До ${nextRank}: ${fmtN(next-pts)} очков</div>
          <div class="mbar"><div class="mbar-f" style="width:${pct}%;background:linear-gradient(90deg,var(--gold3),var(--gold2));"></div></div>`;
      })()}
    </div>

    <!-- СТАТИСТИКА -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;">
      ${[
        ['🏰','Уровень ратуши',(p.castle||[]).find(c=>c.bldId==='castle')?.level||1],
        ['⚔','Армия',armyTotal()+' воинов'],
        ['🏗','Зданий',(p.castle||[]).filter(c=>c.bldId).length+(p.lands||[]).filter(c=>c.bldId).length],
        ['🔬','Технологий',techCount+' / '+Object.keys(TECHS).length],
        ['🌍','Позиция',p.worldPos?p.worldPos.col+','+p.worldPos.row:'—'],
        ['⏳','Стройка в очереди',(p.queue||[]).length],
      ].map(([i,l,v])=>`
        <div style="background:rgba(0,0,0,.3);border:1px solid var(--gold3);border-radius:5px;padding:7px;display:flex;flex-direction:column;gap:2px;">
          <span style="font-size:16px;">${i}</span>
          <span style="font-size:10px;color:#a08060;">${l}</span>
          <span style="font-size:13px;font-weight:bold;color:var(--gold2);">${v}</span>
        </div>`).join('')}
    </div>

    <!-- РЕДАКТОР АВАТАРА (скрыт по умолчанию) -->
    <div id="avatar-editor" style="display:none;background:rgba(0,0,0,.4);border:1px solid var(--gold3);border-radius:6px;padding:10px;margin-bottom:10px;">
      <div style="font-size:12px;color:var(--gold2);margin-bottom:8px;font-weight:bold;">Выбери аватар:</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;" id="avatar-pick">
        ${AVATARS.map(a=>`<button data-av="${a}" style="width:36px;height:36px;font-size:20px;background:rgba(0,0,0,.4);border:2px solid #5a4020;border-radius:50%;">${a}</button>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--gold2);margin-bottom:6px;">Цвет фона:</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;" id="bg-pick">
        ${AVATAR_BGS.map(bg=>`<button data-bg="${bg}" style="width:28px;height:28px;background:${bg};border:2px solid #5a4020;border-radius:4px;"></button>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--gold2);margin-bottom:6px;">📷 Своя картинка:</div>
      <div style="display:flex;gap:7px;align-items:center;">
        <label style="cursor:pointer;padding:6px 12px;background:linear-gradient(180deg,#3a8a4a,#1d4a26);border:2px solid #5cff7a;border-radius:4px;font-size:11px;font-weight:bold;color:#fff;">
          Загрузить фото
          <input type="file" id="photo-input" accept="image/*" style="display:none;">
        </label>
        ${p.photo?'<button id="remove-photo" class="mbtn red" style="padding:5px 10px;font-size:11px;min-width:auto;">Удалить</button>':''}
      </div>
    </div>
    ${p.isAdmin?`
    <div style="margin-top:14px;border-top:1px solid #501010;padding-top:12px;">
      <div style="font-size:11px;color:#c05050;font-weight:bold;letter-spacing:1px;margin-bottom:8px;">⚙ ИНСТРУМЕНТЫ АДМИНИСТРАТОРА</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button data-admin="fill" style="padding:10px 14px;background:linear-gradient(180deg,#5a1a1a,#2a0808);border:1px solid #903030;border-radius:6px;color:#faa;font-size:12px;font-weight:bold;cursor:pointer;text-align:left;">
          💰 Максимальные ресурсы + все технологии
        </button>
        <button data-admin="complete" style="padding:10px 14px;background:linear-gradient(180deg,#5a1a1a,#2a0808);border:1px solid #903030;border-radius:6px;color:#faa;font-size:12px;font-weight:bold;cursor:pointer;text-align:left;">
          ⚡ Завершить все очереди строительства и обучения
        </button>
        <button data-admin="max-buildings" style="padding:10px 14px;background:linear-gradient(180deg,#5a1a1a,#2a0808);border:1px solid #903030;border-radius:6px;color:#faa;font-size:12px;font-weight:bold;cursor:pointer;text-align:left;">
          🏗 +5 уровней всем построенным зданиям
        </button>
      </div>
    </div>`:''}`;

  const actions=[
    {label:'🏆 Рейтинг',kind:'gold',handler:()=>{showRatingModal();},close:true},
    {label:'Изменить аватар',kind:'gray',handler:()=>{
      const ed=con.querySelector('#avatar-editor');
      ed.style.display=ed.style.display==='none'?'block':'none';
    },close:false},
    {label:'💬 Чат',handler:()=>openChat(),close:true},
  ];

  const bg=modal({title:'👑 Профиль',body:con,actions});

  // Логика админ-кнопок
  if(p.isAdmin){
    con.querySelectorAll('[data-admin]').forEach(btn=>{
      btn.onmouseenter=()=>btn.style.borderColor='#d05050';
      btn.onmouseleave=()=>btn.style.borderColor='#903030';
      btn.onclick=async()=>{
        const action=btn.dataset.admin;
        btn.disabled=true;btn.style.opacity='.5';
        try{
          await api('/api/admin/'+action,{method:'POST',body:{}});
          await refreshState();renderTopbar();renderMap();
          toast('✓ Выполнено','ok');
        }catch(e){toast(e.message,'err');}
        btn.disabled=false;btn.style.opacity='1';
      };
    });
  }

  // Логика аватар-редактора
  let curAv=avatar,curBg=avatarBg;
  async function saveAvatar(opts={}){
    const body={avatar:curAv,bg:curBg,...opts};
    try{
      await api('/api/avatar',{method:'POST',body});
      toast('Аватар обновлён','ok');
      await refreshState();
      // Обновляем отображение
      const disp=con.querySelector('#avatar-display');
      if(disp){
        if(S.player.photo) disp.innerHTML=`<img src="${S.player.photo}" style="width:100%;height:100%;object-fit:cover;">`;
        else {disp.style.background=curBg;disp.innerHTML=`<span style="font-size:36px;">${curAv}</span>`;}
      }
    }catch(e){toast(e.message,'err');}
  }
  // Клик на аватар — открыть редактор
  con.querySelector('#avatar-wrap').onclick=()=>{
    const ed=con.querySelector('#avatar-editor');
    ed.style.display=ed.style.display==='none'?'block':'none';
  };
  // Выбор эмодзи
  con.querySelectorAll('#avatar-pick button').forEach(btn=>{
    btn.onclick=async()=>{
      curAv=btn.dataset.av;
      con.querySelectorAll('#avatar-pick button').forEach(b=>b.style.borderColor='#5a4020');
      btn.style.borderColor='var(--gold2)';
      await saveAvatar({avatar:curAv,photo:null});
    };
  });
  // Выбор фона
  con.querySelectorAll('#bg-pick button').forEach(btn=>{
    btn.onclick=async()=>{
      curBg=btn.dataset.bg;
      con.querySelectorAll('#bg-pick button').forEach(b=>b.style.borderColor='#5a4020');
      btn.style.borderColor='var(--gold2)';
      await saveAvatar({bg:curBg});
    };
  });
  // Загрузка фото
  const photoInput=con.querySelector('#photo-input');
  if(photoInput) photoInput.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>2*1024*1024){toast('Файл слишком большой (макс 2МБ)','err');return;}
    const reader=new FileReader();
    reader.onload=async ev=>{
      // Сжимаем через Canvas
      const img=new Image();
      img.onload=async()=>{
        const canvas=document.createElement('canvas');
        const size=120;canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        // Вписываем в квадрат
        const scale=Math.max(size/img.width,size/img.height);
        const sw=img.width*scale,sh=img.height*scale;
        ctx.drawImage(img,(size-sw)/2,(size-sh)/2,sw,sh);
        const compressed=canvas.toDataURL('image/jpeg',0.7);
        await saveAvatar({photo:compressed});
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  // Удаление фото
  const removeBtn=con.querySelector('#remove-photo');
  if(removeBtn) removeBtn.onclick=async()=>saveAvatar({photo:null});
}

async function showRatingModal(){
  const con=document.createElement('div');
  con.innerHTML='<p style="text-align:center;color:#a89070;font-size:12px;">Загрузка...</p>';
  const bg=modal({title:'🏆 Рейтинг игроков',body:con});
  try{
    const d=await api('/api/rating');
    const me=S.player.username;
    const myRank=(d.top.findIndex(p=>p.username===me)+1)||'?';
    let html=`<div style="font-size:12px;color:#a89070;text-align:center;margin-bottom:10px;">
      Твоё место: <b style="color:var(--gold2);font-size:16px;">#${myRank}</b>
      из <b>${d.top.length}</b> игроков
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">`;
    d.top.forEach((p,i)=>{
      const isMeR=p.username===me;
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      const {t:rt,c:rc}=ratingTitle(p.rating);
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px;
        background:${isMeR?'rgba(212,162,54,.15)':'rgba(0,0,0,.3)'};
        border:1px solid ${isMeR?'var(--gold2)':'var(--gold3)'};border-radius:5px;">
        <span style="font-size:16px;width:28px;text-align:center;flex-shrink:0;">${medal}</span>
        <span style="font-size:16px;">${RACE_G[p.race]||'👤'}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:bold;color:${isMeR?'var(--gold2)':'#e0d0b0'};font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.kingdom}</div>
          <div style="font-size:10px;color:${rc};">${rt}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-weight:bold;color:var(--gold2);font-size:14px;">${fmtN(p.rating)}</div>
          <div style="font-size:10px;color:#a09060;">⚔${p.armySize}</div>
        </div>
      </div>`;
    });
    if(!d.top.length) html+='<p style="text-align:center;color:#a89070;padding:20px;">Ещё нет игроков</p>';
    html+='</div>';
    con.innerHTML=html;
  }catch(e){con.innerHTML=`<p style="color:#ff8080;text-align:center;">${e.message}</p>`;}
}

// ── ЧАТ ────────────────────────────────────────────────
function fmtCT(t){const d=new Date(t);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function appendChat(msg,prepend=false){
  const msgs=$('#chat-msgs');if(!msgs)return;
  const mine=msg.username===S?.player?.username;
  const el=document.createElement('div');
  el.className='cmsg'+(mine?' me':'')+(msg.system?' sys':'');
  if(msg.system)el.innerHTML=`<span>${escH(msg.text||'')}</span>`;
  else{
    const dn=msg.kingdom||msg.username;
    el.innerHTML=`<div class="ch"><span class="cr">${RACE_G[msg.race]||'👤'}</span><span class="cn">${escH(dn)}</span><span class="ct">${fmtCT(msg.t)}</span></div><div class="cx">${escH(msg.text)}</div>`;
  }
  if(prepend)msgs.insertBefore(el,msgs.firstChild);
  else msgs.appendChild(el);
  if(!prepend)msgs.scrollTop=msgs.scrollHeight;
}
function sendChat(){
  const inp=$('#chat-inp');const text=(inp.value||'').trim();
  if(!text||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'chat',text}));inp.value='';inp.focus();
}
async function openChat(){
  chatOpen=true;chatUnread=0;
  const b=$('#chat-nb');b.style.display='none';
  $('#chat-panel').classList.add('open');
  const msgs=$('#chat-msgs');
  if(msgs.children.length===0){
    try{
      const d=await api('/api/chat');
      if(d.messages?.length)d.messages.forEach(m=>appendChat(m));
      else appendChat({system:true,text:'Чат пока пуст — напиши что-нибудь!',t:Date.now()});
    }catch{appendChat({system:true,text:'Не удалось загрузить историю',t:Date.now()});}
  }
  setTimeout(()=>$('#chat-inp')?.focus(),250);
}
function closeChat(){chatOpen=false;$('#chat-panel').classList.remove('open');}
function initChat(){
  const btn=$('#chat-btn');if(!btn)return;
  btn.style.display='flex';
  btn.onclick=()=>chatOpen?closeChat():openChat();
  $('#chat-close').onclick=closeChat;
  $('#chat-send').onclick=sendChat;
  $('#chat-inp').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}};
}

// ── AUTH ────────────────────────────────────────────────
function initAuth(){
  $('#sw1').onclick=$('#toReg').onclick=()=>{$('#aLogin').style.display='none';$('#aReg').style.display='block';};
  $('#sw2').onclick=()=>{$('#aReg').style.display='none';$('#aLogin').style.display='block';};
  let selRace=null;
  const rp=$('#racePick');
  rp.innerHTML=Object.entries(RACES).map(([id,r])=>`
    <div class="rcard" data-race="${id}">
      <div class="rg">${RACE_G[id]}</div>
      <div class="rn">${r.name}</div>
      <div class="rb">${r.bonus}</div>
    </div>`).join('');
  rp.onclick=e=>{
    const c=e.target.closest('.rcard');if(!c)return;
    rp.querySelectorAll('.rcard').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel');selRace=c.dataset.race;
  };
  $('#liBtn').onclick=async()=>{
    $('#liE').textContent='';
    try{await api('/api/login',{method:'POST',body:{username:$('#liU').value.trim(),password:$('#liP').value}});await enterGame();}
    catch(e){$('#liE').textContent=e.message;}
  };
  $('#reBtn').onclick=async()=>{
    $('#reE').textContent='';
    if(!selRace){$('#reE').textContent='Выберите расу';return;}
    try{
      await api('/api/register',{method:'POST',body:{username:$('#reU').value.trim(),password:$('#reP').value,race:selRace,kingdom:$('#reK').value.trim()}});
      await enterGame();
    }catch(e){$('#reE').textContent=e.message;}
  };
}

async function enterGame(){
  $('#auth').style.display='none';
  $('#app').style.display='grid';
  preload();
  await refreshState();

  // Навигация
  $$('.tab').forEach(t=>t.addEventListener('click',()=>{
    const loc=t.dataset.loc;
    if(loc==='menu'){showMenu();return;}
    if(loc==='army'){showArmyModal();return;}
    $$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    LOC=loc;vpX=0;vpY=0;renderMap();
  }));

  // Боковая панель — теперь плавная
  const sbtn=$('#sidebtn');
  const spanel=$('#sidepanel');
  sbtn.onclick=()=>{
    const open=spanel.classList.toggle('open');
    sbtn.textContent=open?'◀':'▶';
  };
  $$('#sidepanel .sb').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.a;
    spanel.classList.remove('open');sbtn.textContent='▶';
    if(a==='logout'){api('/api/logout',{method:'POST'}).then(()=>location.reload());return;}
    if(a==='army')showArmyModal();
    else if(a==='tech')showTechModal();
    else if(a==='reports')showReportsModal();
    else if(a==='profile')showProfileModal();
  }));

  connectWS();initChat();initDrag();startAnim();

  // Таймеры
  setInterval(()=>{
    $('#timebar').textContent=clk();
    $$('[data-timer]').forEach(el=>{const s=(+el.dataset.timer-Date.now())/1000;el.textContent=s<=0?'✓ Готово':'⌛ '+fmtT(s);});
  },1000);
  setInterval(()=>{if(!ws||ws.readyState!==1)refreshState();},10000);
}

function showMenu(){
  const bd=document.createElement('div');
  bd.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;';
  [
    ['👑','Профиль',showProfileModal],
    ['📨','Отчёты',showReportsModal],
    ['⚔','Армия',showArmyModal],
    ['🔬','Технологии',showTechModal],
    ['💬','Чат',openChat],
    ['🏆','Рейтинг',()=>showRatingModal()],
    ['🚪','Выход',()=>{api('/api/logout',{method:'POST'}).then(()=>location.reload());}],
  ].forEach(([i,n,h])=>{
    const c=document.createElement('div');
    c.style.cssText='padding:10px 4px;background:linear-gradient(180deg,#5a3018,#2a1008);border:2px solid var(--gold3);border-radius:4px;text-align:center;cursor:pointer;transition:border-color .15s;';
    c.innerHTML=`<div style="font-size:28px;line-height:1;">${i}</div><div style="font-size:11px;color:var(--gold2);font-weight:bold;margin-top:4px;">${n}</div>`;
    c.onmouseenter=()=>c.style.borderColor='var(--gold2)';
    c.onmouseleave=()=>c.style.borderColor='var(--gold3)';
    c.onclick=()=>{bg.remove();h();};bd.appendChild(c);
  });
  const bg=modal({title:'📜 Меню',body:bd});
}

// Автологин
(async()=>{
  initAuth();
  try{S=await api('/api/state');await enterGame();}catch(e){}
})();
</script>
